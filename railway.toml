[build]
buildCommand = "pip install -r requirements.txt ; cd CourseMasterApp ; python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd CourseMasterApp ; python manage.py migrate --noinput ; gunicorn CourseMasterApp.wsgi --log-file -"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
